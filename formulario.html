<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="conteudo">
    <form action="documento.html" method="get" autocomplete="off"><!--TROCAR O GET NÂO E SEGURO PARA FORMULARIOS REAIS O GET QUE ESTÀ ATUAL E PARA FINALIDADES DE TESTE -->

        <div class="grupo">
            <label for="campo1">Codigo do Processo</label>
            <input type="text" id="cod_processo" name="campo1" placeholder="Insira o codigo do processo aqui" autocomplete="off">
        </div>
        <div class="grupo">
            <label for="campo1">Requerimento: </label>
            <input type="text" id="requerimento" name="campo1" placeholder="Insira o requerimento aqui" autocomplete="off">
        </div>

        <div class="grupo">
            <label for="campo2">Nome do Requerente</label>
            <input type="text" id="nome_requerente" name="campo2" autocomplete="on" autocapitalize="on">
        </div>
        <div class="grupo">
            <label for="campo2">Ato administrativo:</label>
            <input type="text" id="Ato" name="campo2" autocomplete="on" autocapitalize="on">
        </div>
        <div class="grupo">
            <label for="campo2">Endereço da Propriedade:</label>
            <input type="text" id="Endereço" name="campo2" autocomplete="on" autocapitalize="on">
        </div>
        <div class="grupo">
            <label for="select1">Porte</label>
            <select id="Porte" name="select1"> 
                <option value="Pequeno">Pequeno</option>
                <option value="Médio">Médio</option>
                <option value="Grande">Grande</option>
            </select>
        </div>
        <div class="grupo">
            <label for="campo2">Área da Propriedade:</label>
            <input type="number" id="areaProp" min="0.0001" step="0.0001" name="campo2" autocomplete="off" autocapitalize="on">
        </div>        
        <div class="grupo">
            <label for="campo2">Área da Atividade:</label>
            <input type="number" id="areaAtvd" min="0.0001" step="0.0001" name="campo2" autocomplete="off" autocapitalize="on">
        </div>        
        <!-- <div class="grupo"> select para estádo
            <label for="select1">Estado:</label>
            <select id="estado" name="select1"> 
            </select>
        </div>         -->
        <div class="grupo">
            <label for="select1">Municipio</label>
            <select id="municipio" name="select1"> 
            </select>
        </div>
        <div class="grupo">
            <input type="checkbox" class="checkbox" id="check1" name="opcoes[]" value="op1">
            <label for="check1"><b>Placeholder</b></label>

            <input type="checkbox" class="checkbox" id="check2" name="opcoes[]" value="op2">
            <label for="check2"><b>Placeholder</b></label>

            <input type="checkbox" class="checkbox" id="check3" name="opcoes[]" value="op3">
            <label for="check3"><b>Placeholder</b></label>
        </div>

        <div class="grupo">
            <label for="textarea1">Text-area:</label>
            <textarea id="textarea1" name="textarea1" rows="4"></textarea>
        </div>

        <div class="grupo">
            <label for="data"><b>Data</b></label>
            <input type="date" id="data" name="data">
        </div>

        

        <div class="grupo">
            <label for="arquivo"><b>Envie algo</b></label>
            <input type="file" id="arquivo" name="arquivo">
        </div>

        <div class="grupo">
            <button type="submit" id="btnCadastrar" name="btnCadastrar">
                Cadastrar
            </button>

            <button type="reset" id="btnLimpar">
                Limpar
            </button>
        </div>

    </form>
</div>
<script src="municipios.js"></script>
<script src="form.js"></script>

</body>
</html>
